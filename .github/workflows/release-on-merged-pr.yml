name: Release on merged PR

on:
  pull_request:
    types: [closed]
    # 修改为你的目标分支，例如 master/release
    branches: [ v1.8 ]

permissions:
  contents: write
  pull-requests: read

jobs:
  build-and-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test --no-daemon

      - name: Read project metadata (version & name)
        id: meta
        shell: bash
        run: |
          VERSION=$(grep -E '^plugin_version=' gradle.properties | cut -d'=' -f2 | tr -d '\r')
          PLUGIN_NAME=$(grep -E '^plugin_name=' gradle.properties | cut -d'=' -f2 | tr -d '\r')
          if [ -z "$VERSION" ]; then
            echo "未在 gradle.properties 中找到 plugin_version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "plugin_name=${PLUGIN_NAME:-Release}" >> "$GITHUB_OUTPUT"

      - name: Compute tag (avoid duplicates)
        id: tag
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const version = process.env.VERSION;
            const baseTag = `v${version}`;
            let tag = baseTag;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${baseTag}` });
              tag = `${baseTag}-${context.payload.pull_request.number}`;
              core.info(`Tag ${baseTag} exists, using fallback ${tag}`);
            } catch (e) {
              core.info(`Tag ${baseTag} is available`);
            }
            core.setOutput('tag', tag);

      - name: Generate release notes (PR commits)
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner, repo, pull_number: pr.number, per_page: 100
            });
            const lines = commits.map(c => `- ${c.sha.substring(0,7)} ${c.commit.message.split('\n')[0]} (${c.author?.login ?? c.commit.author?.name ?? 'unknown'})`);
            const header = `PR #${pr.number}: ${pr.title}\nMerged by: ${pr.merged_by?.login ?? 'unknown'}\nURL: ${pr.html_url}\n\nCommits:\n`;
            core.setOutput('body', header + lines.join('\n'));

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.meta.outputs.plugin_name }} v${{ steps.meta.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ contains(steps.meta.outputs.version, 'alpha') || contains(steps.meta.outputs.version, 'beta') || contains(steps.meta.outputs.version, 'rc') }}
          files: |
            build/libs/*.jar

