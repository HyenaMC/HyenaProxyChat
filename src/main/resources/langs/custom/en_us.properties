#You can replace any default translation here!
#Placeholders:
#{0}: proxy name
#{1}: server name
#{2}: player name
#{3}: chat message
#You can use color character: “§”

#Fallback chat format:
#Global: qu_an.chat.message.chat.default=<chat_format>
#Local: qu_an.chat.message.chat.default.local=<chat_format>

#Server exclusive chat formats:
#Use fallback chat format when missing.
#Global: qu_an.chat.message.chat.server.<server_id>=<chat_format>
#Local: qu_an.chat.message.chat.server.<server_id>.local=<chat_format>
#Examples: 
# qu_an.chat.message.chat.server.lobby=§8[§r{0}§8|§r{1}§8]§r<{2}§r> {3}
# qu_an.chat.message.chat.server.lobby.local=§8[§rLocal§8]§r<{2}§r> {3}
#An example ignores the server name: 
# qu_an.chat.message.chat.server.survival=§8[§r{0}§8]§r<{2}§r> {3}

#Server names:
#Use server id when missing.
#Usage: qu_an.chat.server.name.<server_id>=<server_name>
#Use the value of qu_an.chat.server.not_found.name when server id is missing.
#Examples: 
# qu_an.chat.server.name.lobby=Lobby
# qu_an.chat.server.name.survival=§aSurvival
